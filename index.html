<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFI PLATFORM - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #080a0f;
            --panel-bg: rgba(18, 22, 32, 0.7);
            --accent-glow: #ff5500;
            --steam-blue: #66c0f4;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b92a5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* --- TŁO DYMNE (ANIMOWANE) --- */
        .smoke-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(20, 25, 35, 0.5) 0%, #080a0f 80%),
                        url('https://cdn.akamai.steamstatic.com/apps/csgo/images/csgo_react/environmental/nuke_01.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
            filter: brightness(0.3);
            animation: drift 30s infinite alternate ease-in-out;
        }
        @keyframes drift { from { transform: scale(1.05); } to { transform: scale(1.1); } }

        /* --- PASEK BOCZNY (SIDEBAR) --- */
        .sidebar {
            width: 80px;
            background: rgba(10, 12, 18, 0.9);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .nav-item {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-radius: 12px;
            transition: 0.3s;
            text-decoration: none;
        }
        .nav-item.active, .nav-item:hover {
            color: #fff;
            background: var(--accent-glow);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* --- KONTENER GŁÓWNY --- */
        .main-content {
            margin-left: 80px;
            padding: 40px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        /* BRANDING (LOGO PO PRAWEJ U GÓRY) */
        .top-nav {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo-box img {
            width: 60px;
            filter: drop-shadow(0 0 10px #fff);
        }

        /* --- STATYSTYKI (OSOBNO) --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-card span { display: block; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card b { font-size: 1.6rem; color: #fff; }
        .stat-card.lvl { border-bottom: 3px solid var(--accent-glow); }

        /* --- PRZYCISKI NA ŚRODKU --- */
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .btn:hover { transform: translateY(-5px); background: rgba(255,255,255,0.05); border-color: #fff; }
        .btn i { font-size: 1.6rem; color: var(--accent-glow); }
        .btn img { height: 28px; filter: grayscale(1); transition: 0.3s; }
        .btn:hover img { filter: grayscale(0); }

        /* --- HISTORIA MECZÓW --- */
        .history-section {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }
        .history-title { margin-bottom: 20px; letter-spacing: 2px; font-size: 0.9rem; color: var(--text-muted); }
        .match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #00d381; /* Zielony dla Win */
        }
        .match-row.loss { border-left-color: #ff3366; }

        /* --- PRAWA KOLUMNA (YT) --- */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .yt-card {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            aspect-ratio: 9/16;
        }

        @media (max-width: 1100px) {
            .main-content { grid-template-columns: 1fr; }
            .right-col { display: none; }
        }
    </style>
</head>
<body>

    <div class="smoke-bg"></div>

    <div class="sidebar">
        <a href="#" class="nav-item active" title="Home">
            <i class="fa-solid fa-house"></i>
        </a>
        <a href="https://www.faceit.com/" target="_blank" class="nav-item">
            <i class="fa-solid fa-gamepad"></i>
        </a>
        <a href="https://steamcommunity.com/id/REFIs" target="_blank" class="nav-item">
            <i class="fa-brands fa-steam"></i>
        </a>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div class="welcome-text">
                <h2 id="greet">Witaj, REFI</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Twoje centrum dowodzenia.</p>
            </div>
            <div class="logo-box">
                <img src="LOGO.png" alt="REFI Logo" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="left-col">
            
            <div class="stats-row">
                <div class="stat-card lvl"><span>Poziom</span><b>10</b></div>
                <div class="stat-card"><span>Elo</span><b>2214</b></div>
                <div class="stat-card"><span>Win Rate</span><b>50%</b></div>
                <div class="stat-card"><span>K/D</span><b>1.02</b></div>
            </div>

            <div class="hero-grid">
                <a href="https://dmarket.com/" target="_blank" class="btn">
                    <img src="Dmarket.png" alt="D">
                    <div><b>DMarket</b><br><small>Handluj skinami</small></div>
                </a>
                <a href="https://csfloat.com/" target="_blank" class="btn">
                    <img src="csfloat.png" alt="F">
                    <div><b>CSFloat</b><br><small>Baza danych</small></div>
                </a>
                <a href="https://www.tiktok.com/@x_refi_x" target="_blank" class="btn">
                    <i class="fa-brands fa-tiktok"></i>
                    <div><b>TikTok</b><br><small>Obserwuj @x_refi_x</small></div>
                </a>
                <a href="https://www.twitch.tv/refi_" target="_blank" class="btn">
                    <i class="fa-brands fa-twitch"></i>
                    <div><b>Twitch</b><br><small>Streamy na żywo</small></div>
                </a>
            </div>

            <div class="history-section">
                <p class="history-title">OSTATNIE MECZE</p>
                <div class="match-row">
                    <span>Mirage</span>
                    <b>13 : 8</b>
                    <span style="color: #00d381;">WIN</span>
                </div>
                <div class="match-row loss">
                    <span>Anubis</span>
                    <b>10 : 13</b>
                    <span style="color: #ff3366;">LOSS</span>
                </div>
                <div class="match-row">
                    <span>Ancient</span>
                    <b>16 : 14</b>
                    <span style="color: #00d381;">WIN</span>
                </div>
            </div>
        </div>

        <div class="right-col">
            <p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px;">PLAYLISTA REFI</p>
            <div class="yt-card">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/blOGjmQVOp0?list=PLOhj10DD_CCHa8QHZKwfWN2VU0XEBEb3Z" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <a href="ts3server://4gamers.gclan.pl" class="btn" style="justify-content: center;">
                <i class="fa-solid fa-headset"></i> TeamSpeak 3
            </a>
        </div>
    </div>

    <script>
        const h = new Date().getHours();
        const greet = h<12 ? "Dzień dobry" : h<18 ? "Dobrego popołudnia" : "Dobry wieczór";
        document.getElementById('greet').textContent = `${greet}, REFI`;
    </script>
</body>
</html>
