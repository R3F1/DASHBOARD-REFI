<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFI DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --panel-bg: rgba(20, 24, 34, 0.85); /* Ciemniejsze, eleganckie szkło */
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #9aa3af;
            --faceit-color: #ff5500;
            --steam-color: #1b2838;
            --steam-blue: #66c0f4;
            --ts-color: #255d83;
            --dmarket-color: #00d381;
            --csfloat-color: #ff3366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            /* Zapasowe tło w razie problemów z ładowaniem obrazka */
            background-color: #0b0f19; 
        }

        /* --- NAPRAWIONE TŁO (nie ucina się przy krawędziach) --- */
        .background-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Możesz tu wstawić swój plik, np. url('tlo.jpg') */
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1920&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            z-index: -2;
            filter: brightness(0.3) contrast(1.1);
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* --- GŁÓWNY PANEL Z NAPRAWIONYM CIENIEM --- */
        .dashboard {
            background-color: var(--panel-bg);
            padding: 35px;
            border-radius: 20px;
            /* Zlokalizowany cień: mocny czarny dół + delikatna poświata dookoła */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 255, 255, 0.03);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: relative;
            z-index: 1;
        }

        /* NAGŁÓWEK Z LOGIEM */
        .header {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo {
            width: 120px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.15));
        }

        .header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ffffff, #8b92a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .clock-container {
            background: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid var(--panel-border);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        #clock-time {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin-right: 10px;
            letter-spacing: 1px;
        }

        #clock-date {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* --- NOWY WIDGET FACEIT (widget-full) --- */
        .widget-section {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* Tło pod ramką, żeby nie było dziur */
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            overflow: hidden;
        }

        .widget-section iframe {
            width: 100%;
            height: 250px; /* Powiększona wysokość dla wersji widget-full */
            border: none;
        }

        /* SIATKA PRZYCISKÓW */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 10px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
        }

        .btn i {
            font-size: 1.6rem;
            margin-bottom: 6px;
            transition: transform 0.3s ease;
        }

        /* Styl dla wgrywanych logotypów (DMarket i CSFloat) */
        .btn-img-icon {
            height: 32px;
            width: auto;
            margin-bottom: 6px;
            border-radius: 4px;
            transition: transform 0.3s ease;
        }

        .btn-title { font-weight: bold; font-size: 1.05rem; }
        .btn-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        .btn:hover i, .btn:hover .btn-img-icon { transform: scale(1.1); }

        /* KOLORY AKCENTÓW DLA PLATFORM */
        .btn-history { grid-column: span 2; border-bottom: 3px solid var(--faceit-color); }
        .btn-history i { color: var(--faceit-color); }

        .btn-dmarket { border-bottom: 3px solid var(--dmarket-color); }
        .btn-csfloat { border-bottom: 3px solid var(--csfloat-color); }

        .btn-steam { border-bottom: 3px solid var(--steam-blue); }
        .btn-steam i { color: var(--steam-blue); }

        .btn-eq { border-bottom: 3px solid var(--steam-color); }

        .btn-faceit { grid-column: span 2; border-bottom: 3px solid var(--faceit-color); }
        .btn-faceit i { color: var(--faceit-color); }

        /* Przycisk TeamSpeak poziomy */
        .btn-ts {
            grid-column: span 2;
            flex-direction: row;
            justify-content: flex-start;
            padding: 15px 25px;
            border-bottom: 3px solid var(--ts-color);
        }
        .btn-ts i { font-size: 2.2rem; margin-bottom: 0; margin-right: 15px; color: #5599c7; }
        .ts-info { display: flex; flex-direction: column; text-align: left; }

        @media (max-width: 500px) {
            .btn-grid { grid-template-columns: 1fr; }
            .btn-history, .btn-faceit, .btn-ts { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="background-fixed"></div>
    <div class="background-overlay"></div>

    <div class="dashboard">
        <div class="header">
            <img src="LOGO.PNG" alt="Logo REFI" class="header-logo" onerror="this.style.display='none'">
            <h1>REFI DASHBOARD</h1>
            <div class="clock-container">
                <span id="clock-time">00:00:00</span>
                <span id="clock-date">Ładowanie daty...</span>
            </div>
        </div>

        <div class="widget-section">
            <iframe src="https://strugly.com/inc/widget.php?widget_type=widget-full&player=e07d12cd-82c7-4d03-b1eb-4a3f0eec2724&secret=b744818a49a7703d18108d2d39fbc29d" scrolling="no" title="FACEIT Stats"></iframe>
        </div>

        <div class="btn-grid">
            
            <a href="https://www.faceit.com/en/players/R3F1_/cs2/history" target="_blank" class="btn btn-history">
                <i class="fa-solid fa-crosshairs"></i>
                <span class="btn-title">Ostatnie Mecze (Historia)</span>
            </a>

            <a href="https://dmarket.com/" target="_blank" class="btn btn-dmarket">
                <img src="Dmarket.png" alt="DMarket Logo" class="btn-img-icon" onerror="this.style.display='none'">
                <span class="btn-title">DMarket</span>
                <span class="btn-desc">Sklep ze skinami</span>
            </a>

            <a href="https://csfloat.com/" target="_blank" class="btn btn-csfloat">
                <img src="csfloat.png" alt="CSFloat Logo" class="btn-img-icon" onerror="this.style.display='none'">
                <span class="btn-title">CSFloat</span>
                <span class="btn-desc">Baza danych i rynek</span>
            </a>

            <a href="https://steamcommunity.com/id/REFIs" target="_blank" class="btn btn-steam">
                <i class="fa-brands fa-steam"></i>
                <span class="btn-title">Profil Steam</span>
                <span class="btn-desc">Otwórz profil</span>
            </a>

            <a href="https://steamcommunity.com/id/REFIs/inventory" target="_blank" class="btn btn-eq">
                <i class="fa-solid fa-box-open"></i>
                <span class="btn-title">Ekwipunek</span>
                <span class="btn-desc">Sprawdź EQ</span>
            </a>

            <a href="https://www.faceit.com/" target="_blank" class="btn btn-faceit">
                <i class="fa-brands fa-faceit"></i>
                <span class="btn-title">Strona Główna FACEIT</span>
            </a>

            <a href="ts3server://4gamers.gclan.pl" class="btn btn-ts">
                <i class="fa-brands fa-teamspeak"></i>
                <div class="ts-info">
                    <span class="btn-title">Połącz z TeamSpeak</span>
                    <span class="btn-desc">4gamers.gclan.pl</span>
                </div>
            </a>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const formattedTime = now.toLocaleTimeString('pl-PL', timeOptions);
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            let formattedDate = now.toLocaleDateString('pl-PL', dateOptions);
            formattedDate = formattedDate.charAt(0).toUpperCase() + formattedDate.slice(1);

            document.getElementById('clock-time').textContent = formattedTime;
            document.getElementById('clock-date').textContent = formattedDate;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
