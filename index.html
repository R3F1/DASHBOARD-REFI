<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFI DASHBOARD - CS2 Glass Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ZMIENNE KOLORYSTYCZNE --- */
        :root {
            /* Nowe kolory dla przezroczystości i szkła */
            --panel-bg: rgba(20, 25, 35, 0.4); /* Bardziej przezroczyste tło panelu */
            --glass-blur: blur(10px); /* Efekt rozmycia szkła */
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            
            /* Kolory Akcentów Platform */
            --faceit-color: #ff5500;
            --steam-blue: #66c0f4;
            --dmarket-accent: #00d381; /* Turkusowy z loga */
            --csfloat-accent: #6c5ce7;  /* Fioletowy z logu */
            --ts-orange: #ff9f43;
            --main-glow: rgba(108, 92, 231, 0.05); /* Subtelny blask */
        }

        /* --- STYLIZACJA PODSTAWOWA --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Nowe, mroczne, dymne tło z CS2 */
            background: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), /* Nakładka dla kontrastu */
                url('https://cdn.akamai.steamstatic.com/apps/csgo/images/csgo_react/environmental/anubis_01.jpg'); /* Przykład grafiki z CS2 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Tło się nie przewija */
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden; /* Zapobiega przewijaniu ciała */
            animation: backgroundFloat 30s infinite alternate ease-in-out; /* Animacja pływania tła */
        }

        /* Animacja pływania tła */
        @keyframes backgroundFloat {
            0% { background-position: center 10%; }
            100% { background-position: center 90%; }
        }

        /* --- GŁÓWNY PANEL DASHBOARDU (GLASSMORPHISM) --- */
        .dashboard-container {
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--panel-border);
            backdrop-filter: var(--glass-blur); /* Klucz do efektu szkła */
            -webkit-backdrop-filter: var(--glass-blur); /* Wsparcie dla Safari */
            animation: panelFadeIn 1s ease-out; /* Animacja wejścia */
        }

        @keyframes panelFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- NAGŁÓWEK --- */
        .dashboard-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .dashboard-header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sekcja Zegara/Daty */
        .clock-container {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        #clock-time { font-weight: bold; color: #fff; margin-right: 8px;}

        /* --- WIDŻET FACEIT --- */
        .widget-section {
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            /* Przezroczyste tło pod widżetem */
            background-color: rgba(0, 0, 0, 0.2); 
            display: flex;
            justify-content: center;
            border: 1px solid var(--panel-border);
        }

        .widget-section iframe {
            width: 100%;
            max-width: 480px;
            height: 120px; /* Dostosuj w razie potrzeby */
            border: none;
            overflow: hidden;
        }

        /* --- SIATKA PRZYCISKÓW --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* Główne Style Przycisku (Przezroczyste) */
        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            /* Przezroczyste tło początkowe */
            background-color: rgba(255, 255, 255, 0.02); 
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            /* Lekko widoczne tło po najechaniu */
            background-color: rgba(255, 255, 255, 0.05); 
        }

        .btn-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        
        /* Obsługa obrazkowych logotypów */
        .btn-img-icon {
            height: 1.8rem;
            width: auto;
            margin-bottom: 8px;
            opacity: 0.9;
        }
        
        .btn-text {
            display: flex;
            flex-direction: column;
        }
        
        .btn-title { font-size: 1.1rem; }
        .btn-desc { font-size: 0.8rem; color: var(--text-muted); font-weight: normal; margin-top: 2px;}

        /* --- STYLIZACJA SPECYFICZNA DLA PLATFORM --- */
        /* Steam */
        .btn-steam { border-bottom: 3px solid var(--steam-blue); }
        .btn-steam i { color: var(--steam-blue); }
        .btn-steam:hover { box-shadow: 0 5px 15px rgba(102, 192, 244, 0.1); }

        /* FACEIT */
        .btn-faceit { border-bottom: 3px solid var(--faceit-color); }
        .btn-faceit i { color: var(--faceit-color); }
        .btn-faceit:hover { box-shadow: 0 5px 15px rgba(255, 85, 0, 0.1); }

        /* TeamSpeak (Zaktualizowana Ikonka i Kolor) */
        .btn-ts { border-bottom: 3px solid var(--ts-orange); }
        .btn-ts i { color: var(--ts-orange); }
        .btn-ts:hover { box-shadow: 0 5px 15px rgba(255, 159, 67, 0.1); }

        /* DMarket (Turkusowy z loga) */
        .btn-dmarket { border-bottom: 3px solid var(--dmarket-accent); }
        .btn-dmarket:hover { box-shadow: 0 5px 15px rgba(0, 211, 129, 0.1); }

        /* CSFloat (Fioletowy z logu) */
        .btn-csfloat { border-bottom: 3px solid var(--csfloat-accent); }
        .btn-csfloat:hover { box-shadow: 0 5px 15px rgba(108, 92, 231, 0.1); }

        /* --- RESPONSYWNOŚĆ DLA URZĄDZEŃ MOBILNYCH --- */
        @media (max-width: 500px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .dashboard-container { padding: 25px; }
            .dashboard-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>REFI DASHBOARD</h1>
            <div class="clock-container">
                <span id="clock-time">00:00:00</span>
                <span id="clock-date">Data</span>
            </div>
        </div>

        <div class="widget-section">
            <iframe src="https://strugly.com/inc/widget.php?widget_type=widget-full-renew&player=e07d12cd-82c7-4d03-b1eb-4a3f0eec2724&secret=b744818a49a7703d18108d2d39fbc29d" scrolling="no" title="FACEIT Stats"></iframe>
        </div>

        <div class="dashboard-grid">
            
            <a href="URL_DO_TWOJEGO_PROFILU_STEAM" target="_blank" class="btn btn-steam">
                <i class="fa-brands fa-steam btn-icon"></i>
                <div class="btn-text">
                    <span class="btn-title">Profil Steam</span>
                    <span class="btn-desc">Otwórz w nowej karcie</span>
                </div>
            </a>

            <a href="URL_DO_TWOJEGO_EKWIPUNKU_STEAM" target="_blank" class="btn btn-steam">
                <i class="fa-solid fa-box-open btn-icon"></i>
                <div class="btn-text">
                    <span class="btn-title">Ekwipunek</span>
                    <span class="btn-desc">Sprawdź skrytki</span>
                </div>
            </a>

            <a href="URL_DO_TWOJEGO_DMARKET" target="_blank" class="btn btn-dmarket">
                <img src="image_9.png" alt="DMarket Logo" class="btn-img-icon">
                <div class="btn-text">
                    <span class="btn-title">DMarket</span>
                    <span class="btn-desc">Handluj skinami</span>
                </div>
            </a>

            <a href="URL_DO_TWOJEGO_CSFLOAT" target="_blank" class="btn btn-csfloat">
                <img src="image_8.png" alt="CSFloat Logo" class="btn-img-icon">
                <div class="btn-text">
                    <span class="btn-title">CSFloat</span>
                    <span class="btn-desc">Rynek bazy danych</span>
                </div>
            </a>

            <a href="URL_DO_FACEIT" target="_blank" class="btn btn-faceit">
                <i class="fa-brands fa-faceit btn-icon"></i>
                <div class="btn-text">
                    <span class="btn-title">FACEIT</span>
                    <span class="btn-desc">Główna Strona</span>
                </div>
            </a>

            <a href="ts3server://URL_TWOJEGO_TEAMSPEAK" class="btn btn-ts">
                <i class="fa-solid fa-microphone btn-icon"></i> 
                <div class="ts-info">
                    <div class="btn-title">Dołącz na TS3</div>
                    <div class="btn-desc">4gamers.gclan.pl</div>
                </div>
            </a>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Czas
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock-time').textContent = now.toLocaleTimeString('pl-PL', timeOptions);
            
            // Data
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('pl-PL', dateOptions);
            // Wielka litera na początku dnia tygodnia
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            document.getElementById('clock-date').textContent = dateStr;
        }

        setInterval(updateClock, 1000);
        updateClock(); // Pierwsze wywołanie od razu
    </script>

</body>
</html>
