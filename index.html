<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFIs Dashboard PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #07090f;
            --panel-bg: #111520;
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --faceit-color: #ff5500;
            --steam-color: #1b2838;
            --steam-blue: #66c0f4;
            --ts-color: #255d83;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #172033 0%, var(--bg-dark) 80%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            background-color: var(--panel-bg);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 550px;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(10px);
        }

        /* Nagłówek i Zegar */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #8b92a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .clock-container {
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
        }

        #clock-time {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin-right: 10px;
        }

        #clock-date {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Widget Faceit - POPRAWIONE WYRÓWNANIE */
        .widget-section {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            padding: 10px; /* Minimalny margines wewnątrz */
        }

        .widget-section iframe {
            width: 100%;
            max-width: 400px; /* Ograniczenie szerokości do faktycznego rozmiaru statystyk */
            height: 120px;    /* Przycięcie czarnego tła z dołu i góry */
            border: none;
        }

        /* Siatka przycisków */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Style przycisków */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--panel-border);
        }

        .btn i {
            font-size: 1.4rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.15);
        }

        /* Kolory przycisków */
        .btn-steam {
            background: linear-gradient(to right, var(--steam-color), #2a475e);
        }

        .btn-eq {
            background: linear-gradient(to right, #2a475e, var(--steam-blue));
        }

        .btn-faceit {
            background: linear-gradient(to right, #2b1308, #4a210d);
            border-color: rgba(255, 85, 0, 0.3);
            color: #fff;
        }
        
        .btn-faceit i {
            color: var(--faceit-color);
        }

        /* Przycisk historii meczów (zajmuje 2 kolumny) */
        .btn-history {
            grid-column: span 2;
            background: linear-gradient(to right, var(--faceit-color), #cc4400);
            border: none;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(255, 85, 0, 0.3);
        }
        .btn-history:hover {
            box-shadow: 0 6px 20px rgba(255, 85, 0, 0.5);
        }

        /* Przycisk TS3 (zajmuje 2 kolumny) */
        .btn-ts {
            grid-column: span 2;
            background: linear-gradient(to right, var(--ts-color), #1b3d58);
            justify-content: flex-start;
            padding-left: 25px;
        }
        
        .btn-ts i {
            font-size: 2rem;
            margin-right: 10px;
        }
        
        .ts-info {
            display: flex;
            flex-direction: column;
        }
        .ts-title {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .ts-address {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        @media (max-width: 500px) {
            .btn-grid {
                grid-template-columns: 1fr;
            }
            .btn-history, .btn-ts {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>REFIs Dashboard</h1>
            <div class="clock-container">
                <span id="clock-time">00:00:00</span>
                <span id="clock-date">Ładowanie daty...</span>
            </div>
        </div>

        <div class="widget-section">
            <iframe src="https://strugly.com/inc/widget.php?widget_type=widget-full-renew&player=e07d12cd-82c7-4d03-b1eb-4a3f0eec2724&secret=b744818a49a7703d18108d2d39fbc29d" scrolling="no" title="FACEIT Stats"></iframe>
        </div>

        <div class="btn-grid">
            
            <a href="https://www.faceit.com/en/players/R3F1_/cs2/history" target="_blank" class="btn btn-history">
                <i class="fa-solid fa-crosshairs"></i>
                Ostatnie Mecze (Historia CS2)
            </a>

            <a href="https://steamcommunity.com/id/REFIs" target="_blank" class="btn btn-steam">
                <i class="fa-brands fa-steam"></i>
                Profil Steam
            </a>

            <a href="https://steamcommunity.com/id/REFIs/inventory" target="_blank" class="btn btn-eq">
                <i class="fa-solid fa-box-open"></i>
                Ekwipunek
            </a>

            <a href="https://www.faceit.com/" target="_blank" class="btn btn-faceit" style="grid-column: span 2;">
                <i class="fa-brands fa-faceit"></i>
                Strona Główna FACEIT
            </a>

            <a href="ts3server://4gamers.gclan.pl" class="btn btn-ts">
                <i class="fa-brands fa-teamspeak"></i>
                <div class="ts-info">
                    <span class="ts-title">Połącz z TeamSpeak</span>
                    <span class="ts-address">4gamers.gclan.pl</span>
                </div>
            </a>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Formatowanie czasu (np. 14:35:09)
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const formattedTime = now.toLocaleTimeString('pl-PL', timeOptions);
            
            // Formatowanie daty (np. Poniedziałek, 12 października)
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            let formattedDate = now.toLocaleDateString('pl-PL', dateOptions);
            
            // Wielka litera na początku dnia tygodnia
            formattedDate = formattedDate.charAt(0).toUpperCase() + formattedDate.slice(1);

            document.getElementById('clock-time').textContent = formattedTime;
            document.getElementById('clock-date').textContent = formattedDate;
        }

        // Uruchomienie zegara
        setInterval(updateClock, 1000);
        updateClock(); // Wywołanie od razu, żeby nie było opóźnienia
    </script>

</body>
</html>
