<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFIs Dashboard PRO - CS2 Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --panel-bg: rgba(17, 21, 32, 0.75);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a3aabf;
            --faceit-color: #ff5500;
            --steam-color: #1b2838;
            --steam-blue: #66c0f4;
            --ts-color: #255d83;
            --dmarket-color: #00d381;
            --csfloat-color: #ff3366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* --- ANIMOWANE TŁO CS2 (INFERNO) --- */
        .cs2-background {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background: url('https://cdn.akamai.steamstatic.com/apps/csgo/images/csgo_react/environmental/inferno_01.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
            animation: slowPan 30s infinite alternate linear;
            filter: brightness(0.35) contrast(1.1);
        }

        .smoke-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: -1;
        }

        @keyframes slowPan {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-1%, -1%); }
        }

        /* GŁÓWNY PANEL */
        .dashboard {
            background-color: var(--panel-bg);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 85, 0, 0.05);
            width: 100%;
            max-width: 580px;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-height: 95vh;
            overflow-y: auto;
        }

        .dashboard::-webkit-scrollbar {
            width: 6px;
        }
        .dashboard::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1); 
        }
        .dashboard::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2); 
            border-radius: 10px;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- NAGŁÓWEK Z LOGIEM --- */
        .header {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo {
            width: 140px; /* Dostosuj szerokość loga */
            height: auto;
            margin-bottom: 10px;
            /* Subtelna poświata dla loga */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ffffff, #a3aabf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .clock-container {
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid var(--panel-border);
        }

        #clock-time {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin-right: 10px;
            letter-spacing: 1px;
        }

        #clock-date {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* WIDGET FACEIT */
        .widget-section {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .widget-section iframe {
            width: 100%;
            max-width: 450px;
            height: 120px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Siatka przycisków */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid var(--panel-border);
        }

        .btn i {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn:hover i {
            transform: scale(1.1);
        }

        /* Kolory przycisków */
        .btn-history {
            grid-column: span 2;
            background: linear-gradient(135deg, #e64d00, #ff6600);
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 85, 0, 0.3);
        }
        .btn-history:hover {
            box-shadow: 0 8px 25px rgba(255, 85, 0, 0.6);
        }

        .btn-dmarket {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            border-left: 3px solid var(--dmarket-color);
        }
        .btn-dmarket i { color: var(--dmarket-color); }

        .btn-csfloat {
            background: linear-gradient(135deg, #141e30, #243b55);
            border-left: 3px solid var(--csfloat-color);
        }
        .btn-csfloat i { color: var(--csfloat-color); }

        .btn-steam {
            background: linear-gradient(135deg, var(--steam-color), #2a475e);
        }

        .btn-eq {
            background: linear-gradient(135deg, #2a475e, var(--steam-blue));
        }

        .btn-faceit {
            background: linear-gradient(135deg, #1f0e06, #3a1a0a);
            border-color: rgba(255, 85, 0, 0.3);
            grid-column: span 2;
        }
        .btn-faceit i { color: var(--faceit-color); }

        .btn-ts {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--ts-color), #142f45);
            justify-content: flex-start;
            padding-left: 20px;
        }
        
        .btn-ts i {
            font-size: 2rem;
            margin-right: 15px;
            color: #5599c7;
        }
        
        .ts-info {
            display: flex;
            flex-direction: column;
        }
        .ts-title {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .ts-address {
            font-size: 0.85rem;
            color: #8da4b5;
            font-weight: normal;
        }

        @media (max-width: 500px) {
            .btn-grid {
                grid-template-columns: 1fr;
            }
            .btn-history, .btn-faceit, .btn-ts {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="cs2-background"></div>
    <div class="smoke-overlay"></div>

    <div class="dashboard">
        <div class="header">
            <img src="logo.png" alt="Logo REFI" class="header-logo">
            <h1>REFIs Dashboard</h1>
            <div class="clock-container">
                <span id="clock-time">00:00:00</span>
                <span id="clock-date">Ładowanie daty...</span>
            </div>
        </div>

        <div class="widget-section">
            <iframe src="https://strugly.com/inc/widget.php?widget_type=widget-dark&player=e07d12cd-82c7-4d03-b1eb-4a3f0eec2724&secret=b744818a49a7703d18108d2d39fbc29d" scrolling="no" title="FACEIT Stats"></iframe>
        </div>

        <div class="btn-grid">
            
            <a href="https://www.faceit.com/en/players/R3F1_/cs2/history" target="_blank" class="btn btn-history">
                <i class="fa-solid fa-crosshairs"></i>
                Ostatnie Mecze (Historia)
            </a>

            <a href="https://dmarket.com/" target="_blank" class="btn btn-dmarket">
                <i class="fa-solid fa-store"></i>
                DMarket
            </a>

            <a href="https://csfloat.com/" target="_blank" class="btn btn-csfloat">
                <i class="fa-solid fa-chart-line"></i>
                CSFloat
            </a>

            <a href="https://steamcommunity.com/id/REFIs" target="_blank" class="btn btn-steam">
                <i class="fa-brands fa-steam"></i>
                Profil Steam
            </a>

            <a href="https://steamcommunity.com/id/REFIs/inventory" target="_blank" class="btn btn-eq">
                <i class="fa-solid fa-box-open"></i>
                Ekwipunek
            </a>

            <a href="https://www.faceit.com/" target="_blank" class="btn btn-faceit">
                <i class="fa-brands fa-faceit"></i>
                Strona Główna FACEIT
            </a>

            <a href="ts3server://4gamers.gclan.pl" class="btn btn-ts">
                <i class="fa-brands fa-teamspeak"></i>
                <div class="ts-info">
                    <span class="ts-title">Połącz z TeamSpeak</span>
                    <span class="ts-address">4gamers.gclan.pl</span>
                </div>
            </a>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const formattedTime = now.toLocaleTimeString('pl-PL', timeOptions);
            
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            let formattedDate = now.toLocaleDateString('pl-PL', dateOptions);
            formattedDate = formattedDate.charAt(0).toUpperCase() + formattedDate.slice(1);

            document.getElementById('clock-time').textContent = formattedTime;
            document.getElementById('clock-date').textContent = formattedDate;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
