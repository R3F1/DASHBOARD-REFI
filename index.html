<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFI DASHBOARD - WIDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --panel-bg: rgba(10, 15, 20, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a9b5;
            --faceit-glow: #ff5500;
            --steam-glow: #66c0f4;
            --dmarket-glow: #00d381;
            --csfloat-glow: #ff3366;
            --tiktok-glow: #ff0050;
            --twitch-glow: #9146FF;
            --yt-glow: #ff0000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-color: #05070a;
            overflow-x: hidden;
        }

        /* TŁO DYMNE */
        .background-fx {
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(circle at 50% 50%, rgba(15, 25, 35, 0.7) 0%, #05070a 80%),
                        url('https://cdn.akamai.steamstatic.com/apps/csgo/images/csgo_react/environmental/nuke_01.jpg');
            background-size: cover;
            z-index: -2;
            animation: smokeMove 40s infinite alternate ease-in-out;
            filter: brightness(0.4);
        }
        @keyframes smokeMove { from { transform: scale(1); } to { transform: scale(1.1) rotate(1deg); } }

        /* KONTENER GŁÓWNY */
        .dashboard-container {
            background: var(--panel-bg);
            width: 95%;
            max-width: 1100px; /* SZEROKI UKŁAD */
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.7);
            position: relative;
        }

        /* LOGO W PRAWYM GÓRNYM ROGU */
        .top-branding {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-logo {
            width: 50px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        /* NAGŁÓWEK */
        .dashboard-header {
            margin-bottom: 40px;
        }
        .dashboard-header h1 {
            font-size: 2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 900;
            opacity: 0.9;
        }
        .info-bar { display: flex; gap: 15px; margin-top: 10px; }
        .glass-pill {
            background: rgba(255,255,255,0.05);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
        }

        /* GŁÓWNY UKŁAD (LEWO / PRAWO) */
        .main-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr; /* Lewa strona szersza na staty i przyciski */
            gap: 30px;
        }

        /* WIDGET FACEIT */
        .widget-section {
            background: #090b0f;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
        }
        .widget-section iframe { width: 100%; height: 170px; border: none; }

        /* PRZYCISKI W SIATCE */
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
            gap: 15px;
        }
        .btn:hover { transform: translateY(-5px); background: rgba(255,255,255,0.07); }
        .btn i { font-size: 1.4rem; color: var(--text-muted); width: 25px; text-align: center; }
        .btn-img { height: 24px; filter: grayscale(1); transition: 0.3s; }
        .btn:hover .btn-img { filter: grayscale(0); }
        .btn-title { font-weight: 700; font-size: 0.95rem; display: block; }
        .btn-desc { font-size: 0.75rem; color: var(--text-muted); }

        /* KOLORY GLOW */
        .btn-faceit:hover { box-shadow: 0 5px 20px rgba(255, 85, 0, 0.2); border-color: var(--faceit-glow); }
        .btn-steam:hover { box-shadow: 0 5px 20px rgba(102, 192, 244, 0.2); border-color: var(--steam-glow); }
        .btn-tiktok:hover { box-shadow: 0 5px 20px rgba(255, 0, 80, 0.2); border-color: var(--tiktok-glow); }
        .btn-twitch:hover { box-shadow: 0 5px 20px rgba(145, 70, 255, 0.2); border-color: var(--twitch-glow); }

        /* YOUTUBE PLAYER */
        .yt-section {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .yt-section h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 15px; letter-spacing: 2px; }
        .yt-container {
            flex-grow: 1;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            border: 1px solid rgba(255,0,0,0.2);
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .top-branding { position: static; margin-bottom: 20px; justify-content: center; }
            .dashboard-header { text-align: center; }
            .info-bar { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="background-fx"></div>

    <div class="dashboard-container">
        
        <div class="top-branding">
            <img src="LOGO.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
        </div>

        <div class="dashboard-header">
            <h1>REFI DASHBOARD</h1>
            <div class="info-bar">
                <div class="glass-pill"><i class="fa-solid fa-clock"></i> <span id="clock">00:00</span></div>
                <div class="glass-pill"><i class="fa-solid fa-calendar"></i> <span id="date">Data</span></div>
            </div>
        </div>

        <div class="main-layout">
            
            <div class="left-col">
                <div class="widget-section">
                    <iframe src="https://strugly.com/inc/widget.php?widget_type=widget-full-renew&player=e07d12cd-82c7-4d03-b1eb-4a3f0eec2724&secret=b744818a49a7703d18108d2d39fbc29d" scrolling="no"></iframe>
                </div>

                <div class="grid-buttons">
                    <a href="https://www.faceit.com/en/players/R3F1_/cs2/history" target="_blank" class="btn btn-faceit">
                        <i class="fa-solid fa-trophy"></i>
                        <div><span class="btn-title">FACEIT</span><span class="btn-desc">Historia gier</span></div>
                    </a>
                    <a href="https://steamcommunity.com/id/REFIs" target="_blank" class="btn btn-steam">
                        <i class="fa-brands fa-steam"></i>
                        <div><span class="btn-title">Steam</span><span class="btn-desc">Profil główny</span></div>
                    </a>
                    <a href="https://www.tiktok.com/@x_refi_x" target="_blank" class="btn btn-tiktok">
                        <i class="fa-brands fa-tiktok"></i>
                        <div><span class="btn-title">TikTok</span><span class="btn-desc">@x_refi_x</span></div>
                    </a>
                    <a href="https://www.twitch.tv/refi_" target="_blank" class="btn btn-twitch">
                        <i class="fa-brands fa-twitch"></i>
                        <div><span class="btn-title">Twitch</span><span class="btn-desc">refi_</span></div>
                    </a>
                    <a href="https://dmarket.com/" target="_blank" class="btn">
                        <img src="Dmarket.png" class="btn-img" alt="D" onerror="this.style.display='none'">
                        <div><span class="btn-title">DMarket</span><span class="btn-desc">Ekwipunek</span></div>
                    </a>
                    <a href="ts3server://4gamers.gclan.pl" class="btn">
                        <i class="fa-solid fa-headset"></i>
                        <div><span class="btn-title">TeamSpeak 3</span><span class="btn-desc">4gamers.gclan.pl</span></div>
                    </a>
                </div>
            </div>

            <div class="right-col">
                <div class="yt-section">
                    <h3><i class="fa-brands fa-youtube"></i> Muzyka do gry</h3>
                    <div class="yt-container">
                        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PL4fGSI1pDJn6jWnvWbc6Lze768V9fS-o8" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date').textContent = now.toLocaleDateString('pl-PL', {day: 'numeric', month: 'long'});
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
