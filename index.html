<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFI DASHBOARD - Neon Glow Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Prawdziwe, czyste szkło */
            --panel-bg: rgba(15, 20, 25, 0.45); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a1a9b5;
            
            /* NEONOWE KOLORY GLOW */
            --faceit-glow: #ff5500;
            --steam-glow: #66c0f4;
            --dmarket-glow: #00d381;
            --csfloat-glow: #ff3366;
            --ts-glow: #0088cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* Ukrywamy paski przewijania */
            overflow: hidden; 
        }

        /* --- ZAAWANSOWANE, ANIMOWANE TŁO (DYM/MGŁA) --- */
        .background-fx {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(30, 40, 50, 0.8) 0%, #05070a 60%),
                url('https://cdn.akamai.steamstatic.com/apps/csgo/images/csgo_react/environmental/nuke_01.jpg'); 
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            z-index: -2;
            animation: smokeDrift 40s infinite alternate ease-in-out;
            filter: brightness(0.4) contrast(1.2);
        }

        @keyframes smokeDrift {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(3deg) scale(1.1); }
        }

        /* --- GŁÓWNY PANEL (CZYSTE SZKŁO) --- */
        .dashboard-container {
            background-color: var(--panel-bg);
            padding: 35px 40px;
            border-radius: 24px;
            /* Cień rzucany przez całą taflę szkła */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 0 1px var(--glass-border);
            width: 100%;
            max-width: 650px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
            z-index: 1;
            /* Animacja wejścia */
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- NAGŁÓWEK --- */
        .dashboard-header {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo {
            width: 110px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        .dashboard-header h1 {
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #a3aabf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .clock-container {
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        #clock-time { font-size: 1.1rem; font-weight: bold; color: #fff; margin-right: 10px; letter-spacing: 1px;}
        #clock-date { font-size: 0.9rem; color: var(--text-muted); }

        /* --- NAPRAWIONY WIDŻET FACEIT --- */
        .widget-section {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0c0e12; 
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .widget-section iframe {
            width: 100%;
            max-width: 450px;
            /* ZWIĘKSZONA WYSOKOŚĆ - teraz nie ucina statystyk! */
            height: 170px; 
            border: none;
        }

        /* --- SIATKA PRZYCISKÓW NEON GLOW --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 10px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 3px;
            border-radius: 3px 3px 0 0;
            background: var(--text-muted);
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        .btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            transition: transform 0.3s ease, color 0.3s ease;
            color: var(--text-muted);
        }
        
        .btn-img-icon {
            height: 1.8rem;
            width: auto;
            margin-bottom: 8px;
            transition: transform 0.3s ease, filter 0.3s ease;
            filter: grayscale(80%) brightness(1.2);
        }
        
        .btn-text { display: flex; flex-direction: column; }
        .btn-title { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.5px;}
        .btn-desc { font-size: 0.8rem; color: var(--text-muted); font-weight: normal; margin-top: 3px;}

        /* --- EFEKTY GLOW DLA KONKRETNYCH PRZYCISKÓW --- */
        
        .btn-faceit-style::after { background: var(--faceit-glow); }
        .btn-faceit-style:hover { box-shadow: 0 10px 25px rgba(255, 85, 0, 0.3); }
        .btn-faceit-style:hover .btn-icon { color: var(--faceit-glow); transform: scale(1.1); }
        
        .btn-history { grid-column: span 2; }

        .btn-steam::after { background: var(--steam-glow); }
        .btn-steam:hover { box-shadow: 0 10px 25px rgba(102, 192, 244, 0.25); }
        .btn-steam:hover .btn-icon { color: var(--steam-glow); transform: scale(1.1); }

        .btn-dmarket::after { background: var(--dmarket-glow); }
        .btn-dmarket:hover { box-shadow: 0 10px 25px rgba(0, 211, 129, 0.25); }
        .btn-dmarket:hover .btn-img-icon { filter: grayscale(0%) brightness(1); transform: scale(1.1); }

        .btn-csfloat::after { background: var(--csfloat-glow); }
        .btn-csfloat:hover { box-shadow: 0 10px 25px rgba(255, 51, 102, 0.25); }
        .btn-csfloat:hover .btn-img-icon { filter: grayscale(0%) brightness(1); transform: scale(1.1); }

        @media (max-width: 550px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .btn-history { grid-column: span 1; }
            .dashboard-container { padding: 25px; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="background-fx"></div>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <img src="LOGO.png" alt="Logo REFI" class="header-logo" onerror="this.style.display='none'">
            <h1>REFI DASHBOARD</h1>
            <div class="clock-container">
                <span id="clock-time">00:00:00</span>
                <span id="clock-date">Data</span>
            </div>
        </div>

        <div class="widget-section">
            <iframe src="https://strugly.com/inc/widget.php?widget_type=widget-full-renew&player=e07d12cd-82c7-4d03-b1eb-4a3f0eec2724&secret=b744818a49a7703d18108d2d39fbc29d" scrolling="no" title="FACEIT Stats"></iframe>
        </div>

        <div class="dashboard-grid">
            
            <a href="https://www.faceit.com/en/players/R3F1_/cs2/history" target="_blank" class="btn btn-faceit-style btn-history">
                <i class="fa-solid fa-crosshairs btn-icon"></i>
                <div class="btn-text">
                    <span class="btn-title">Ostatnie Mecze</span>
                    <span class="btn-desc">Historia gier Faceit</span>
                </div>
            </a>

            <a href="https://dmarket.com/" target="_blank" class="btn btn-dmarket">
                <img src="Dmarket.png" alt="DMarket Logo" class="btn-img-icon" onerror="this.style.display='none'">
                <div class="btn-text">
                    <span class="btn-title">DMarket</span>
                    <span class="btn-desc">Handluj skinami</span>
                </div>
            </a>

            <a href="https://csfloat.com/" target="_blank" class="btn btn-csfloat">
                <img src="csfloat.png" alt="CSFloat Logo" class="btn-img-icon" onerror="this.style.display='none'">
                <div class="btn-text">
                    <span class="btn-title">CSFloat</span>
                    <span class="btn-desc">Rynek bazy danych</span>
                </div>
            </a>

            <a href="https://steamcommunity.com/id/REFIs" target="_blank" class="btn btn-steam">
                <i class="fa-brands fa-steam btn-icon"></i>
                <div class="btn-text">
                    <span class="btn-title">Profil Steam</span>
                    <span class="btn-desc">Otwórz w nowej karcie</span>
                </div>
            </a>

            <a href="https://steamcommunity.com/id/REFIs/inventory" target="_blank" class="btn btn-steam">
                <i class="fa-solid fa-box-open btn-icon"></i>
                <div class="btn-text">
                    <span class="btn-title">Ekwipunek</span>
                    <span class="btn-desc">Sprawdź skrytki</span>
                </div>
            </a>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock-time').textContent = now.toLocaleTimeString('pl-PL', timeOptions);
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('pl-PL', dateOptions);
            document.getElementById('clock-date').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
